<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Things I need to do</title>
    <style>
        /* Базові стилі */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px;
            background-color: #ffffff;
            color: #000000;
        }

        h1 {
            font-size: 2.5em;
            margin-top: 0;
            margin-bottom: 40px;
        }

        /* Контейнер для дошки (колонок) */
        .board {
            display: flex;
            gap: 30px;
            overflow-x: auto;
            align-items: flex-start;
            padding-bottom: 20px;
            /* Плавне прокручування для мобільних */
            scroll-behavior: smooth;
        }

        /* Приховуємо стандартний скролбар для естетики */
        .board::-webkit-scrollbar {
            height: 8px;
        }
        .board::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .board::-webkit-scrollbar-thumb {
            background: #ccc; 
            border-radius: 4px;
        }
        .board::-webkit-scrollbar-thumb:hover {
            background: #aaa; 
        }

        /* Стилі колонки */
        .column {
            min-width: 280px;
            display: flex;
            flex-direction: column;
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .column-title {
            font-weight: bold;
            font-size: 1.2em;
            border: none;
            outline: none;
            background: transparent;
            width: 100%;
        }

        /* Стилі рядка (завдання) */
        .task {
            display: flex;
            align-items: flex-start;
            border-bottom: 1px solid #f0f0f0;
            padding: 12px 0;
            gap: 10px;
            transition: background-color 0.2s;
        }

        .task:hover {
            background-color: #fafafa;
        }

        /* Чекбокс для викреслювання */
        .task-checkbox {
            margin-top: 4px;
            cursor: pointer;
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .task-text {
            flex-grow: 1;
            outline: none;
            min-height: 20px;
            word-break: break-word;
            line-height: 1.4;
        }

        /* Стан виконаного завдання (закреслення) */
        .task.completed .task-text {
            text-decoration: line-through;
            color: #a0a0a0;
        }

        /* Кнопки */
        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            color: #ccc;
            font-size: 1.5em; /* Трохи збільшив для зручності на телефоні */
            padding: 0 5px;
            line-height: 1;
        }

        .btn-icon:hover {
            color: #ff4d4d;
        }

        .header-controls {
            display: flex;
            gap: 5px;
        }

        .btn-add {
            background-color: #f5f5f5;
            border: 1px solid #e0e0e0;
            padding: 12px 8px; /* Більше місця для натискання пальцем */
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            margin-top: 10px;
            color: #555;
            transition: all 0.2s;
        }

        .btn-add:hover {
            background-color: #e8e8e8;
            color: #000;
        }

        .top-controls {
            margin-bottom: 20px;
        }

        .btn-primary {
            background-color: #000;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
        }

        .btn-primary:hover {
            background-color: #333;
        }

        /* --- АДАПТАЦІЯ ДЛЯ МОБІЛЬНИХ ПРИСТРОЇВ --- */
        @media (max-width: 768px) {
            body {
                padding: 20px 15px; /* Менші відступи по краях екрана */
            }

            h1 {
                font-size: 2em; /* Трохи менший заголовок */
                margin-bottom: 25px;
            }

            .board {
                gap: 15px; /* Менша відстань між колонками */
                scroll-snap-type: x mandatory; /* Вмикаємо прилипання при скролі */
                padding-bottom: 10px;
            }

            .column {
                min-width: 85vw; /* Колонка займає 85% ширини екрана */
                scroll-snap-align: start; /* Прилипає до лівого краю */
            }

            .btn-primary {
                width: 100%; /* Кнопка на всю ширину для зручності */
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Things I need todo</h1>
        <div class="top-controls">
            <button class="btn-primary" id="addColumnBtn">+ Додати колонку</button>
        </div>
    </header>

    <div id="board" class="board">
        </div>

    <script>
        const board = document.getElementById('board');
        const addColumnBtn = document.getElementById('addColumnBtn');

        // Головна функція збереження даних
        function saveData() {
            const columnsData = [];
            const columns = document.querySelectorAll('.column');
            
            columns.forEach(col => {
                const title = col.querySelector('.column-title').innerText;
                const tasksData = [];
                const tasks = col.querySelectorAll('.task');
                
                tasks.forEach(task => {
                    const text = task.querySelector('.task-text').innerText;
                    const isCompleted = task.querySelector('.task-checkbox').checked;
                    tasksData.push({ text: text, completed: isCompleted });
                });
                
                columnsData.push({ title: title, tasks: tasksData });
            });
            
            localStorage.setItem('myTasksBoard', JSON.stringify(columnsData));
        }

        // Функція для створення нового завдання (рядка)
        function createTaskElement(text = "Нове завдання", isCompleted = false) {
            const taskDiv = document.createElement('div');
            taskDiv.className = 'task';
            if (isCompleted) taskDiv.classList.add('completed');

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'task-checkbox';
            checkbox.checked = isCompleted;

            const textSpan = document.createElement('span');
            textSpan.className = 'task-text';
            textSpan.contentEditable = true;
            textSpan.innerText = text;

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn-icon';
            deleteBtn.innerHTML = '×';

            checkbox.addEventListener('change', () => {
                if (checkbox.checked) {
                    taskDiv.classList.add('completed');
                } else {
                    taskDiv.classList.remove('completed');
                }
                saveData(); 
            });

            deleteBtn.addEventListener('click', () => {
                taskDiv.remove();
                saveData(); 
            });

            textSpan.addEventListener('input', () => {
                saveData(); 
            });

            // Виправляємо баг з Enter на мобільних пристроях (щоб не створювався новий абзац)
            textSpan.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    textSpan.blur(); // Знімаємо фокус після натискання Enter
                }
            });

            taskDiv.appendChild(checkbox);
            taskDiv.appendChild(textSpan);
            taskDiv.appendChild(deleteBtn);

            return taskDiv;
        }

        // Функція для створення нової колонки
        function createColumn(titleText = "Назва колонки", tasks = []) {
            const columnDiv = document.createElement('div');
            columnDiv.className = 'column';

            const headerDiv = document.createElement('div');
            headerDiv.className = 'column-header';

            const titleInput = document.createElement('span');
            titleInput.className = 'column-title';
            titleInput.contentEditable = true;
            titleInput.innerText = titleText;
            
            titleInput.addEventListener('input', () => {
                saveData(); 
            });
            
            titleInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    titleInput.blur();
                }
            });

            const controlsDiv = document.createElement('div');
            controlsDiv.className = 'header-controls';

            const deleteColBtn = document.createElement('button');
            deleteColBtn.className = 'btn-icon';
            deleteColBtn.innerHTML = '×';
            deleteColBtn.addEventListener('click', () => {
                // Додаємо підтвердження видалення, щоб випадково не натиснути на телефоні
                if(confirm("Точно видалити цю колонку?")) {
                    columnDiv.remove();
                    saveData();
                }
            });

            controlsDiv.appendChild(deleteColBtn);
            headerDiv.appendChild(titleInput);
            headerDiv.appendChild(controlsDiv);

            const tasksContainer = document.createElement('div');
            
            const addTaskBtn = document.createElement('button');
            addTaskBtn.className = 'btn-add';
            addTaskBtn.innerText = "+ Додати рядок";
            addTaskBtn.addEventListener('click', () => {
                tasksContainer.appendChild(createTaskElement(""));
                saveData(); 
            });

            columnDiv.appendChild(headerDiv);
            columnDiv.appendChild(tasksContainer);
            columnDiv.appendChild(addTaskBtn);
            board.appendChild(columnDiv);

            if (tasks.length > 0) {
                tasks.forEach(task => {
                    tasksContainer.appendChild(createTaskElement(task.text, task.completed));
                });
            } else {
                tasksContainer.appendChild(createTaskElement(""));
            }
        }

        addColumnBtn.addEventListener('click', () => {
            createColumn("Нова колонка", []);
            saveData();
        });

        // Функція завантаження даних
        function loadData() {
            const savedData = localStorage.getItem('myTasksBoard');
            
            if (savedData) {
                const columnsData = JSON.parse(savedData);
                columnsData.forEach(colData => {
                    createColumn(colData.title, colData.tasks);
                });
            } else {
                // Дефолтні дані для першого запуску
                createColumn("5 берез.", [{ text: "Зробити каву", completed: false }]);
                createColumn("6 берез.", []);
                createColumn("7 берез.", []);
            }
        }

        loadData();

    </script>

</body>
</html>
